<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>For Malak ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- الصفحة الأولى -->

<div id="questionPage" class="center">

<h1 class="title">Do you love me? ❤️</h1>

<img src="images/malak-main.jpg" class="photo">

<div class="buttons">

<button id="yesBtn">Yes 💚</button>
<button id="noBtn">No 💔</button>

</div>

<p id="loveText" class="loveText"></p>

</div>



<!-- صفحة عيد الميلاد -->

<div id="birthdayPage" class="center hidden">

<h1 class="birthdayTitle">Happy Birthday Malak 🎂</h1>

<img src="images/cake.png" class="bigCake">

<p class="birthdayMsg">
May your year be filled with happiness, love and beautiful moments ❤️
</p>

</div>


<audio id="music" loop>
<source src="music/birthday.mp3">
</audio>


<script src="script.js"></script>

</body>

</html>
